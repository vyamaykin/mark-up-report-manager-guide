document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +
              'var n = p[j], tn = n && n.tagName;' +
              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

v style=\"width:100%;max-width:940px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap;\">\n    <div style=\"display:flex;align-items:center;gap:12px;\">\n      <img src=\"040e6e9f-8391-49c4-9ca7-cebd3caac06b\" alt=\"Goodwill\" style=\"height:48px;width:auto;display:block;flex:none;\">\n      <div style=\"line-height:1.15;\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:15px;color:#00263E;letter-spacing:.2px;\">MERS Goodwill<\u002Fdiv>\n        <div style=\"font-size:12px;color:#5F6B6D;font-weight:600;\">Mark Up Report · Store Manager Guide<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:12px;font-weight:700;color:#0065A4;background:#fff;border:1px solid #CCE8F5;padding:7px 13px;border-radius:999px;\">Step {{ stepHuman }} of {{ total }}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- progress dots -->\n  <div style=\"width:100%;max-width:940px;display:flex;gap:7px;margin-bottom:20px;\">\n    <sc-for list=\"{{ dots }}\" as=\"dot\" hint-placeholder-count=\"10\">\n      <button onclick=\"{{ dot.onClick }}\" title=\"{{ dot.label }}\" style=\"{{ dot.style }}\"><\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- Card -->\n  <div style=\"width:100%;max-width:940px;background:#fff;border-radius:18px;box-shadow:0 18px 50px -22px rgba(0,38,62,.45),0 2px 8px rgba(0,38,62,.06);border:1px solid #E6EEF4;overflow:hidden;\">\n    <div style=\"height:6px;background:linear-gradient(90deg,#0065A4,#82C341);\"><\u002Fdiv>\n    <div style=\"padding:40px 46px 38px;min-height:486px;display:flex;flex-direction:column;\">\n\n      <!-- STEP 0 — Welcome -->\n      <sc-if value=\"{{ s0 }}\">\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;align-items:center;\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:1.5px;color:#0065A4;text-transform:uppercase;margin-bottom:14px;\">A 5-minute tour<\u002Fdiv>\n        <h1 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:54px;line-height:1.04;margin:0 0 16px;color:#00263E;letter-spacing:-1px;\">Your report.<br><span style=\"color:#0065A4;\">Your bonus.<\u002Fspan><\u002Fh1>\n        <p style=\"font-size:19px;line-height:1.55;color:#3A4A52;max-width:560px;margin:0 0 30px;\">No spreadsheets. No math homework. Just a quick, friendly look at how the <strong>Mark Up Report<\u002Fstrong> helps you grow your monthly bonus — one month at a time.<\u002Fp>\n        <div style=\"background:#F0F6FB;border:1px solid #CCE8F5;border-radius:14px;padding:18px 26px 20px;\">\n          <div style=\"font-size:12px;font-weight:700;color:#5F6B6D;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;text-align:center;\">Store manager — full monthly bonus<\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-end;gap:14px;justify-content:center;\">\n            <div style=\"text-align:center;\"><div style=\"font-size:12px;font-weight:700;color:#5F6B6D;\">Below goal<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:30px;color:#C1272D;line-height:1.1;\">$0<\u002Fdiv><\u002Fdiv>\n            <div style=\"font-size:24px;color:#929CD0;font-weight:300;padding-bottom:4px;\">→<\u002Fdiv>\n            <div style=\"text-align:center;\"><div style=\"font-size:12px;font-weight:700;color:#5F6B6D;\">Hit 100%<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:30px;color:#0065A4;line-height:1.1;\">$700<\u002Fdiv><\u002Fdiv>\n            <div style=\"font-size:24px;color:#929CD0;font-weight:300;padding-bottom:4px;\">→<\u002Fdiv>\n            <div style=\"text-align:center;background:#E5F4D8;border-radius:10px;padding:6px 14px;\"><div style=\"font-size:12px;font-weight:700;color:#5a7d2f;\">Reach 110%<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:30px;color:#5a9e1f;line-height:1.1;\">$1,000<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:13px;color:#5F6B6D;line-height:1.45;text-align:center;margin-top:14px;\">The further you beat your goal, the bigger the check. Below 100% pays nothing — let's earn it.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 1 — The bonus -->\n      <sc-if value=\"{{ s1 }}\">\n      <div style=\"\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#0065A4;text-transform:uppercase;margin-bottom:8px;\">The big idea<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;margin:0 0 18px;color:#00263E;letter-spacing:-.5px;\">How your bonus actually works<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.6;color:#3A4A52;margin:0 0 22px;max-width:680px;\">Every month your store has a <strong>sales goal<\u002Fstrong>. Hit it and you earn a bonus. Go further past it and the check gets bigger. Simple as that.<\u002Fp>\n        <div style=\"display:flex;gap:14px;align-items:stretch;flex-wrap:wrap;margin-bottom:24px;\">\n          <div style=\"flex:1;min-width:280px;background:#00263E;border-radius:14px;padding:24px 26px;color:#fff;\">\n            <div style=\"font-size:13px;font-weight:700;color:#82C341;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;\">The only formula you need<\u002Fdiv>\n            <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:23px;line-height:1.35;\">Your Sales ÷ Your Goal<br>= <span style=\"color:#FD9D0D;\">% of Goal<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:14px;color:#B9C7D2;margin-top:12px;line-height:1.45;\">\"Sales\" = everything your store rings up: donated items, purchased items, and online.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:280px;background:#F0F6FB;border:1px solid #CCE8F5;border-radius:14px;padding:22px 24px;\">\n            <div style=\"font-size:13px;font-weight:700;color:#5F6B6D;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;\">Store Manager — full monthly bonus<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:9px;\">\n              <div style=\"display:flex;justify-content:space-between;align-items:center;font-size:16px;\"><span style=\"color:#5F6B6D;\">Below 100% of goal<\u002Fspan><span style=\"font-family:'Archivo',sans-serif;font-weight:800;color:#C1272D;\">$0<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;align-items:center;font-size:16px;border-top:1px solid #DCE8F1;padding-top:9px;\"><span style=\"color:#00263E;font-weight:600;\">Hit 100%<\u002Fspan><span style=\"font-family:'Archivo',sans-serif;font-weight:800;color:#0065A4;\">$700<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;align-items:center;font-size:16px;\"><span style=\"color:#00263E;font-weight:600;\">Reach 105%<\u002Fspan><span style=\"font-family:'Archivo',sans-serif;font-weight:800;color:#0065A4;\">$850<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;align-items:center;font-size:16px;background:#E5F4D8;margin:2px -10px -6px;padding:9px 10px;border-radius:8px;\"><span style=\"color:#00263E;font-weight:700;\">110% or more<\u002Fspan><span style=\"font-family:'Archivo',sans-serif;font-weight:900;color:#5a9e1f;\">$1,000<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:center;background:#FFF6E8;border:1px solid #FAD89A;border-radius:12px;padding:16px 20px;\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:30px;color:#FD9D0D;flex:none;\">!<\u002Fdiv>\n          <div style=\"font-size:16px;line-height:1.5;color:#5a4a22;\"><strong>Below 100% of goal pays nothing.<\u002Fstrong> That's why every single sale matters — and why the Mark Up Report is your best friend.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 2 — Mark Up -->\n      <sc-if value=\"{{ s2 }}\">\n      <div style=\"\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#0065A4;text-transform:uppercase;margin-bottom:8px;\">Plain English · 1 of 2<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;margin:0 0 18px;color:#00263E;letter-spacing:-.5px;\">What \"Mark Up\" means<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.6;color:#3A4A52;margin:0 0 26px;max-width:680px;\"><strong>Mark Up<\u002Fstrong> is just how much you raise an item's price above the standard tag price. A little mark up = a little more money in the till for each item that sells.<\u002Fp>\n        <div style=\"display:flex;align-items:center;justify-content:center;gap:30px;background:#F0F6FB;border:1px solid #CCE8F5;border-radius:16px;padding:34px 24px;margin-bottom:24px;flex-wrap:wrap;\">\n          <div style=\"text-align:center;\">\n            <div style=\"font-size:12px;font-weight:700;color:#5F6B6D;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;\">Standard price<\u002Fdiv>\n            <div style=\"display:inline-block;background:#fff;border:2px dashed #B9C7D2;border-radius:10px;padding:16px 24px;font-family:'Archivo',sans-serif;font-weight:800;font-size:30px;color:#5F6B6D;\">$1.99<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center;color:#0065A4;\"><div style=\"font-size:34px;font-weight:300;\">→<\u002Fdiv><div style=\"font-size:13px;font-weight:700;color:#0065A4;\">marked up<\u002Fdiv><\u002Fdiv>\n          <div style=\"text-align:center;\">\n            <div style=\"font-size:12px;font-weight:700;color:#5F6B6D;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;\">Your price<\u002Fdiv>\n            <div style=\"display:inline-block;background:#00263E;border-radius:10px;padding:16px 24px;font-family:'Archivo',sans-serif;font-weight:800;font-size:30px;color:#82C341;\">$2.49<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:18px;line-height:1.6;color:#3A4A52;margin:0;max-width:680px;\">More mark up sounds great… but there's a catch worth knowing about. <span style=\"color:#0065A4;font-weight:700;\">(Next →)<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 3 — Sell-Thru -->\n      <sc-if value=\"{{ s3 }}\">\n      <div style=\"\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#0065A4;text-transform:uppercase;margin-bottom:8px;\">Plain English · 2 of 2<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;margin:0 0 18px;color:#00263E;letter-spacing:-.5px;\">What \"Sell-Thru\" means<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.6;color:#3A4A52;margin:0 0 24px;max-width:700px;\"><strong>Sell-Thru<\u002Fstrong> is the percent of your items that actually <em>sell<\u002Fem> instead of sitting on the rack. High sell-thru means product is moving and money is coming in.<\u002Fp>\n        <div style=\"background:#F0F6FB;border:1px solid #CCE8F5;border-radius:16px;padding:26px 28px;margin-bottom:22px;\">\n          <div style=\"display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:#5F6B6D;margin-bottom:12px;\"><span>100 ITEMS ON THE RACK<\u002Fspan><span style=\"color:#5a9e1f;\">68 SOLD = GOOD SELL-THRU<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:5px;\">\n            <sc-for list=\"{{ rack }}\" as=\"cell\" hint-placeholder-count=\"40\">\n              <div style=\"width:15px;height:15px;border-radius:3px;background:{{ cell.color }};\"><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:18px;margin-top:14px;font-size:13px;color:#5F6B6D;font-weight:600;\"><span style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:12px;height:12px;border-radius:3px;background:#82C341;display:inline-block;\"><\u002Fspan>Sold<\u002Fspan><span style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:12px;height:12px;border-radius:3px;background:#D7E2EA;display:inline-block;\"><\u002Fspan>Still sitting<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:center;background:#FFF6E8;border:1px solid #FAD89A;border-radius:12px;padding:16px 20px;\">\n          <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:30px;color:#FD9D0D;flex:none;\">!<\u002Fdiv>\n          <div style=\"font-size:16px;line-height:1.5;color:#5a4a22;\"><strong>Here's the catch:<\u002Fstrong> price something too high and it won't sell. Mark Up and Sell-Thru pull against each other — let's find the balance.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 4 — Simulator -->\n      <sc-if value=\"{{ s4 }}\">\n      <div style=\"\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#82C341;text-transform:uppercase;margin-bottom:8px;\">Try it yourself<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;margin:0 0 8px;color:#00263E;letter-spacing:-.5px;\">Find the sweet spot<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.55;color:#3A4A52;margin:0 0 22px;max-width:700px;\">Drag the slider. Watch your sell-thru, your sales, and your <strong>bonus<\u002Fstrong> move as mark up goes up. Stay under the <span style=\"color:#C1272D;font-weight:700;\">15% line<\u002Fspan>.<\u002Fp>\n\n        <!-- slider -->\n        <div style=\"background:#F0F6FB;border:1px solid #CCE8F5;border-radius:16px;padding:24px 26px 20px;margin-bottom:18px;\">\n          <div style=\"display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px;\">\n            <div style=\"font-size:14px;font-weight:700;color:#5F6B6D;\">How much you mark up<\u002Fdiv>\n            <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:30px;color:#0065A4;line-height:1;\">{{ markup }}%<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:relative;padding-top:10px;\">\n            <input type=\"range\" min=\"0\" max=\"28\" step=\"1\" value=\"{{ markup }}\" oninput=\"{{ onMarkup }}\" style=\"width:100%;height:8px;cursor:pointer;\">\n            <div style=\"position:absolute;top:6px;bottom:-2px;left:53.57%;width:2px;background:#C1272D;\"><\u002Fdiv>\n            <div style=\"position:absolute;left:53.57%;top:-8px;transform:translateX(-50%);font-size:11px;font-weight:800;color:#C1272D;background:#fff;border:1px solid #f0c2c4;border-radius:5px;padding:1px 6px;white-space:nowrap;\">15% limit<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- outcomes -->\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap;align-items:stretch;\">\n          <div style=\"flex:1.4;min-width:300px;display:flex;flex-direction:column;gap:14px;\">\n            <div>\n              <div style=\"display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px;\"><span style=\"font-weight:600;color:#3A4A52;\">How much sells <span style=\"color:#8a979e;font-weight:400;\">(Sell-Thru)<\u002Fspan><\u002Fspan><span style=\"font-weight:700;color:#00263E;\">{{ sellThruTxt }}%<\u002Fspan><\u002Fdiv>\n              <div style=\"height:14px;background:#E2EAF0;border-radius:8px;overflow:hidden;\"><div style=\"height:100%;width:{{ sellThruW }}%;background:#0065A4;border-radius:8px;transition:width .35s ease;\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px;\"><span style=\"font-weight:600;color:#3A4A52;\">Money coming in <span style=\"color:#8a979e;font-weight:400;\">(Sales)<\u002Fspan><\u002Fspan><span style=\"font-weight:700;color:#00263E;\">{{ salesTxt }}<\u002Fspan><\u002Fdiv>\n              <div style=\"height:14px;background:#E2EAF0;border-radius:8px;overflow:hidden;\"><div style=\"height:100%;width:{{ salesW }}%;background:#929CD0;border-radius:8px;transition:width .35s ease;\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px;\"><span style=\"font-weight:600;color:#3A4A52;\">% of your goal<\u002Fspan><span style=\"font-weight:800;color:{{ statusColor }};\">{{ pct }}%<\u002Fspan><\u002Fdiv>\n              <div style=\"position:relative;height:14px;background:#E2EAF0;border-radius:8px;overflow:hidden;\"><div style=\"height:100%;width:{{ goalW }}%;background:{{ statusColor }};border-radius:8px;transition:width .35s ease,background .3s;\"><\u002Fdiv><div style=\"position:absolute;top:-3px;bottom:-3px;left:83.3%;width:2px;background:#00263E;\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:11px;color:#5F6B6D;text-align:right;margin-top:3px;font-weight:600;\">↑ 100% goal line<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:220px;background:{{ bonusBg }};border:2px solid {{ statusColor }};border-radius:14px;padding:20px 22px;display:flex;flex-direction:column;justify-content:center;text-align:center;transition:all .3s;\">\n            <div style=\"font-size:13px;font-weight:700;color:#5F6B6D;text-transform:uppercase;letter-spacing:.5px;\">Your bonus this month<\u002Fdiv>\n            <div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:46px;color:{{ statusColor }};line-height:1.1;margin:4px 0 6px;\">{{ bonusTxt }}<\u002Fdiv>\n            <div style=\"font-size:14px;line-height:1.45;color:#3A4A52;font-weight:600;\">{{ statusMsg }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 5 — Store map activity -->\n      <sc-if value=\"{{ s5 }}\">\n      <div style=\"\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#82C341;text-transform:uppercase;margin-bottom:8px;\">Activity · tap the dots<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;margin:0 0 8px;color:#00263E;letter-spacing:-.5px;\">Reading the store map<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.55;color:#3A4A52;margin:0 0 18px;max-width:720px;\">Each dot is a store. <strong>Left–to–right<\u002Fstrong> shows how much it marked up. The <span style=\"color:#C1272D;font-weight:700;\">red line<\u002Fspan> is the 15% limit. <strong style=\"color:#5a9e1f;\">Tap the two stores that went over the line.<\u002Fstrong><\u002Fp>\n\n        <div style=\"position:relative;background:#F7FAFC;border:1px solid #CCE8F5;border-radius:14px;height:340px;padding:18px 20px 34px 44px;margin-bottom:14px;\">\n          <!-- y label -->\n          <div style=\"position:absolute;left:8px;top:50%;transform:rotate(-90deg) translateX(50%);transform-origin:left;font-size:11px;font-weight:700;color:#8a979e;white-space:nowrap;\">How much sells →<\u002Fdiv>\n          <!-- plot -->\n          <div style=\"position:relative;width:100%;height:100%;\">\n            <!-- threshold line -->\n            <div style=\"position:absolute;top:0;bottom:0;left:62.5%;width:2px;background:#C1272D;\"><\u002Fdiv>\n            <div style=\"position:absolute;top:-2px;left:62.5%;transform:translateX(-50%);font-size:10px;font-weight:800;color:#C1272D;background:#fff;border:1px solid #f0c2c4;border-radius:4px;padding:1px 5px;\">15% limit<\u002Fdiv>\n            <div style=\"position:absolute;bottom:-26px;left:62.5%;transform:translateX(-50%);font-size:11px;color:#8a979e;font-weight:700;\">15%<\u002Fdiv>\n            <div style=\"position:absolute;bottom:-26px;left:0;font-size:11px;color:#8a979e;font-weight:700;\">5%<\u002Fdiv>\n            <div style=\"position:absolute;bottom:-26px;right:0;font-size:11px;color:#8a979e;font-weight:700;\">More mark up →<\u002Fdiv>\n            <sc-for list=\"{{ stores }}\" as=\"store\" hint-placeholder-count=\"20\">\n              <button onclick=\"{{ store.onClick }}\" title=\"{{ store.name }}\" style=\"{{ store.style }}\"><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:center;background:{{ mapNoteBg }};border:1px solid {{ mapNoteBorder }};border-radius:12px;padding:14px 18px;min-height:54px;transition:all .2s;\">\n          <div style=\"font-size:15px;line-height:1.45;color:#3A4A52;font-weight:600;\">{{ mapNote }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 6 — Scenario -->\n      <sc-if value=\"{{ s6 }}\">\n      <div style=\"\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#82C341;text-transform:uppercase;margin-bottom:8px;\">Activity · your call<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;margin:0 0 16px;color:#00263E;letter-spacing:-.5px;\">Your store just turned red<\u002Fh2>\n        <div style=\"background:#00263E;color:#fff;border-radius:14px;padding:20px 24px;margin-bottom:20px;font-size:17px;line-height:1.55;\">It's mid-month. The report shows your store sitting <strong style=\"color:#FD9D0D;\">past the 15% line<\u002Fstrong> — and sell-thru is sliding. What's the smart move?<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;\">\n          <sc-for list=\"{{ scenarioOpts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\"><span style=\"font-family:'Archivo',sans-serif;font-weight:800;margin-right:10px;color:{{ opt.keyColor }};\">{{ opt.key }}<\u002Fspan>{{ opt.text }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ scenarioAnswered }}\">\n          <div style=\"margin-top:18px;background:{{ scenarioFbBg }};border:1px solid {{ scenarioFbBorder }};border-radius:12px;padding:16px 20px;font-size:16px;line-height:1.5;color:#2a3940;font-weight:500;\">{{ scenarioFb }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 7 — Quick check -->\n      <sc-if value=\"{{ s7 }}\">\n      <div style=\"\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#82C341;text-transform:uppercase;margin-bottom:8px;\">Activity · quick check<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;margin:0 0 22px;color:#00263E;letter-spacing:-.5px;\">Two quick questions<\u002Fh2>\n\n        <div style=\"margin-bottom:24px;\">\n          <div style=\"font-size:18px;font-weight:700;color:#00263E;margin-bottom:12px;\">1. Your bonus is based on…<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;\">\n            <sc-for list=\"{{ q1Opts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.text }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:18px;font-weight:700;color:#00263E;margin-bottom:12px;\">2. Marking everything up as high as possible will…<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px;\">\n            <sc-for list=\"{{ q2Opts }}\" as=\"opt\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.text }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ quizDone }}\">\n          <div style=\"margin-top:20px;background:#E5F4D8;border:1px solid #b5dd8f;border-radius:12px;padding:16px 20px;font-size:16px;line-height:1.5;color:#3c5a1f;font-weight:600;\">Nice work — you've got it. Your bonus follows your <strong>sales vs goal<\u002Fstrong>, and smart mark up keeps items selling so those sales actually happen.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 8 — Checklist -->\n      <sc-if value=\"{{ s8 }}\">\n      <div style=\"\">\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:1px;color:#0065A4;text-transform:uppercase;margin-bottom:8px;\">Take it to the floor<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:34px;margin:0 0 8px;color:#00263E;letter-spacing:-.5px;\">Your game plan this week<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.55;color:#3A4A52;margin:0 0 20px;max-width:700px;\">Five small moves. Tap each one as you do it.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:11px;\">\n          <sc-for list=\"{{ checklist }}\" as=\"item\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ item.onClick }}\" style=\"{{ item.style }}\">\n              <span style=\"{{ item.boxStyle }}\">{{ item.check }}<\u002Fspan>\n              <span style=\"{{ item.textStyle }}\">{{ item.text }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-if value=\"{{ allChecked }}\">\n          <div style=\"margin-top:18px;background:#E5F4D8;border:1px solid #b5dd8f;border-radius:12px;padding:16px 20px;font-size:16px;line-height:1.5;color:#3c5a1f;font-weight:700;\">That's the whole routine. Do this every week and watch your % of goal climb. 💪<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- STEP 9 — Done -->\n      <sc-if value=\"{{ s9 }}\">\n      <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;align-items:center;\">\n        <div style=\"width:74px;height:74px;border-radius:50%;background:#E5F4D8;display:flex;align-items:center;justify-content:center;margin-bottom:18px;animation:mug-pop .5s ease both;\"><div style=\"font-family:'Archivo',sans-serif;font-size:40px;color:#5a9e1f;font-weight:900;\">✓<\u002Fdiv><\u002Fdiv>\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:40px;margin:0 0 14px;color:#00263E;letter-spacing:-.5px;\">That's it — you've got this.<\u002Fh2>\n        <p style=\"font-size:18px;line-height:1.55;color:#3A4A52;max-width:560px;margin:0 0 26px;\">Three things to remember:<\u002Fp>\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:760px;margin-bottom:30px;\">\n          <div style=\"flex:1;min-width:200px;background:#F0F6FB;border:1px solid #CCE8F5;border-radius:14px;padding:20px;\"><div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:24px;color:#0065A4;margin-bottom:6px;\">1<\u002Fdiv><div style=\"font-size:15px;line-height:1.45;color:#3A4A52;\">Bonus = your <strong>sales vs goal<\u002Fstrong>. Below 100% pays $0.<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1;min-width:200px;background:#F0F6FB;border:1px solid #CCE8F5;border-radius:14px;padding:20px;\"><div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:24px;color:#0065A4;margin-bottom:6px;\">2<\u002Fdiv><div style=\"font-size:15px;line-height:1.45;color:#3A4A52;\">Keep mark up <strong>under 15%<\u002Fstrong> so items still sell.<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1;min-width:200px;background:#F0F6FB;border:1px solid #CCE8F5;border-radius:14px;padding:20px;\"><div style=\"font-family:'Archivo',sans-serif;font-weight:900;font-size:24px;color:#0065A4;margin-bottom:6px;\">3<\u002Fdiv><div style=\"font-size:15px;line-height:1.45;color:#3A4A52;\">Check the report weekly. <strong>Green = bigger check.<\u002Fstrong><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ restart }}\" style=\"appearance:none;border:2px solid #0065A4;cursor:pointer;font-family:'Archivo',sans-serif;font-weight:700;font-size:16px;padding:12px 28px;border-radius:10px;background:#fff;color:#0065A4;\">Start over<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Nav -->\n  <div style=\"width:100%;max-width:940px;display:flex;justify-content:space-between;align-items:center;margin-top:22px;\">\n    <button onclick=\"{{ back }}\" style=\"{{ backStyle }}\">← Back<\u002Fbutton>\n    <div style=\"font-size:13px;color:#8a979e;font-weight:600;\">{{ stepLabel }}<\u002Fdiv>\n    <button onclick=\"{{ next }}\" style=\"{{ nextStyle }}\">{{ nextLabel }}<\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  state = { step: 0, markup: 12, found: {}, mapNote: null, scenario: null, q1: null, q2: null, checks: {} };\n\n  labels = ['Welcome','Your bonus','Mark Up','Sell-Thru','The sweet spot','Store map','Your store','Quick check','This week','Done!'];\n\n  storeData = [\n    {name:'Farmington', x:6, y:72}, {name:'Granite City', x:5.5, y:63},\n    {name:'Arnold', x:8, y:74}, {name:'Alton', x:7, y:66},\n    {name:'Bayless', x:8.5, y:69}, {name:'Belleville', x:8, y:61},\n    {name:'Carbondale', x:9.5, y:64}, {name:'Sikeston', x:9, y:59},\n    {name:'Cape Girardeau', x:10, y:71}, {name:'Moberly', x:10.5, y:60},\n    {name:'Centralia', x:11, y:63}, {name:'Chesterfield Valley', x:11.5, y:70},\n    {name:'Mexico', x:12, y:57}, {name:'Chestnut Crossing', x:12.5, y:62},\n    {name:'Battlefield', x:13, y:68}, {name:'Clayton Road', x:13.6, y:57},\n    {name:'Brentwood', x:14.2, y:65}, {name:'Rolla', x:14, y:61},\n    {name:'Ozark', x:21, y:64, red:true}, {name:'St. Robert', x:21.6, y:57, red:true},\n  ];\n\n  smBonus(pct){\n    if (pct < 100) return 0;\n    if (pct >= 110) return 1000;\n    const t = {100:700,101:725,102:750,103:775,104:800,105:850,106:875,107:900,108:925,109:950};\n    return t[pct] != null ? t[pct] : 700;\n  }\n\n  go(n){ this.setState({ step: Math.max(0, Math.min(this.labels.length-1, n)) }); }\n\n  renderVals(){\n    const step = this.state.step;\n    const total = this.labels.length;\n    const last = total - 1;\n\n    // step flags\n    const sFlags = {};\n    for (let i=0;i<total;i++) sFlags['s'+i] = (step === i);\n\n    // progress dots\n    const dots = this.labels.map((label,i)=>{\n      const active = i === step, done = i < step;\n      const bg = done ? '#82C341' : active ? '#0065A4' : '#D7E2EA';\n      return { label, idx:i,\n        onClick: ()=>this.go(i),\n        style: `flex:1;height:7px;border:none;border-radius:4px;cursor:pointer;padding:0;background:${bg};transition:background .25s;${active?'box-shadow:0 0 0 3px rgba(0,101,164,.18);':''}` };\n    });\n\n    // ---- simulator ----\n    const m = this.state.markup;\n    const sellThru = Math.max(8, 82 - Math.max(0, m-12)*3.8);\n    const avgPrice = 5 + 0.22*m;\n    const idx = avgPrice * sellThru;\n    const pct = Math.round(idx/560*100);\n    const bonus = this.smBonus(Math.min(110, Math.max(0,pct)));\n    const statusKey = m > 15 ? 'over' : (pct >= 100 ? 'sweet' : 'under');\n    const statusColor = statusKey==='over' ? '#C1272D' : statusKey==='sweet' ? '#5a9e1f' : '#FD9D0D';\n    const bonusBg = statusKey==='over' ? '#FBEAEA' : statusKey==='sweet' ? '#E5F4D8' : '#FFF6E8';\n    const statusMsg = statusKey==='over'\n      ? 'Too far. Past the 15% limit shoppers walk away — sell-thru tanks and your bonus is gone.'\n      : statusKey==='sweet'\n        ? 'The money zone! Priced right, still selling, past your goal. Keep mark up under 15%.'\n        : 'Underpriced — you\\u2019re leaving money on the table and sales fall short of goal.';\n    const salesIdxMax = 700;\n\n    // ---- rack (step 3) ----\n    const rack = Array.from({length:100}, (_,i)=>({ color: i < 68 ? '#82C341' : '#D7E2EA' }));\n\n    // ---- store map ----\n    const found = this.state.found;\n    const stores = this.storeData.map(s=>{\n      const left = (s.x/24)*100;\n      const bottom = ((s.y-45)/45)*100; // map 45-90 to 0-100\n      const isFound = !!found[s.name];\n      const size = s.red ? 22 : 17;\n      let bg, border;\n      if (s.red){ bg = isFound ? '#C1272D' : '#E8888B'; border = isFound ? '#7d1417' : '#C1272D'; }\n      else { bg = '#9CC96B'; border = '#82C341'; }\n      const ring = isFound ? 'box-shadow:0 0 0 5px rgba(193,39,45,.22);' : '';\n      return { name:s.name,\n        onClick: ()=>{\n          if (s.red){ this.setState({ found: {...this.state.found, [s.name]:true}, mapNote: 'over' }); }\n          else { this.setState({ mapNote: s.x>12 ? 'close' : 'under' }); }\n        },\n        style: `position:absolute;left:${left}%;bottom:${Math.max(2,Math.min(92,bottom))}%;width:${size}px;height:${size}px;margin-left:${-size/2}px;border-radius:50%;border:2px solid ${border};background:${bg};cursor:pointer;padding:0;transition:all .2s;${ring}` };\n    });\n    const redTotal = this.storeData.filter(s=>s.red).length;\n    const foundRed = this.storeData.filter(s=>s.red && found[s.name]).length;\n    const allRedFound = foundRed === redTotal;\n    let mapNote, mapNoteBg, mapNoteBorder;\n    if (allRedFound){ mapNote = 'You found them both — Ozark and St. Robert pushed mark up too high. That\\u2019s exactly what to watch for in your own store.'; mapNoteBg='#E5F4D8'; mapNoteBorder='#b5dd8f'; }\n    else if (this.state.mapNote === 'over'){ mapNote = `Yes! That store is over the 15% line. ${foundRed} of ${redTotal} found — one more.`; mapNoteBg='#E5F4D8'; mapNoteBorder='#b5dd8f'; }\n    else if (this.state.mapNote === 'close'){ mapNote = 'Close, but that one\\u2019s still left of the red line — it\\u2019s healthy. Look further right.'; mapNoteBg='#FFF6E8'; mapNoteBorder='#FAD89A'; }\n    else if (this.state.mapNote === 'under'){ mapNote = 'That\\u2019s a healthy, low mark-up store. The ones you want are far to the right, past the red line.'; mapNoteBg='#FFF6E8'; mapNoteBorder='#FAD89A'; }\n    else { mapNote = 'Tip: the two stores you\\u2019re looking for sit to the right of the red 15% line.'; mapNoteBg='#F0F6FB'; mapNoteBorder='#CCE8F5'; }\n\n    // ---- scenario ----\n    const optBase = 'appearance:none;text-align:left;cursor:pointer;font-family:Public Sans,sans-serif;font-size:16px;line-height:1.45;padding:15px 18px;border-radius:12px;width:100%;transition:all .18s;';\n    const styleFor = (picked, key, correct)=>{\n      if (picked == null) return optBase + 'background:#fff;border:2px solid #CCE8F5;color:#2a3940;';\n      if (correct) return optBase + 'background:#E5F4D8;border:2px solid #82C341;color:#2c4a14;font-weight:600;';\n      if (key === picked) return optBase + 'background:#FBEAEA;border:2px solid #C1272D;color:#7d1417;font-weight:600;';\n      return optBase + 'background:#fff;border:2px solid #E6EEF4;color:#9aa7ae;';\n    };\n    const sc = this.state.scenario;\n    const scenarioDefs = [\n      {key:'A', text:'Mark everything up even higher to make up the lost sales.', correct:false},\n      {key:'B', text:'Lower prices on the slow, over-marked items so they sell and shoppers come back.', correct:true},\n      {key:'C', text:'Ignore it — the month is almost over anyway.', correct:false},\n    ];\n    const scenarioOpts = scenarioDefs.map(o=>({ ...o,\n      onClick: ()=> sc==null ? this.setState({scenario:o.key}) : null,\n      keyColor: sc==null ? '#0065A4' : (o.correct ? '#5a9e1f' : (o.key===sc ? '#C1272D' : '#bcc6cc')),\n      style: styleFor(sc, o.key, o.correct) }));\n    const scenarioAnswered = sc != null;\n    const scenarioRight = sc === 'B';\n    const scenarioFb = scenarioRight\n      ? 'Exactly right. Drop prices on the items that aren\\u2019t moving — they\\u2019ll sell, traffic returns, sell-thru recovers, and your sales climb back toward goal.'\n      : 'Not the move. Marking up further (or waiting) only pushes sell-thru lower. The fix is to lower prices on the slow, over-marked items so they sell — option B.';\n    const scenarioFbBg = scenarioRight ? '#E5F4D8' : '#FBEAEA';\n    const scenarioFbBorder = scenarioRight ? '#b5dd8f' : '#f0c2c4';\n\n    // ---- quiz ----\n    const q1 = this.state.q1, q2 = this.state.q2;\n    const q1Defs = [\n      {key:'a', text:'How much you mark items up', correct:false},\n      {key:'b', text:'Your sales compared to your goal', correct:true},\n      {key:'c', text:'Only the hours you worked', correct:false},\n    ];\n    const q2Defs = [\n      {key:'a', text:'Always grow your bonus', correct:false},\n      {key:'b', text:'Hurt sell-thru and can cost you the bonus', correct:true},\n      {key:'c', text:'Make no difference at all', correct:false},\n    ];\n    const q1Opts = q1Defs.map(o=>({ ...o, onClick:()=> q1==null?this.setState({q1:o.key}):null, style: styleFor(q1,o.key,o.correct) }));\n    const q2Opts = q2Defs.map(o=>({ ...o, onClick:()=> q2==null?this.setState({q2:o.key}):null, style: styleFor(q2,o.key,o.correct) }));\n    const quizDone = q1==='b' && q2==='b';\n\n    // ---- checklist ----\n    const checkDefs = [\n      {id:'open', text:'Open the Mark Up Report and pick your store.'},\n      {id:'side', text:'Check if your store sits left of the 15% line (green) or right (red).'},\n      {id:'find', text:'Spot your high mark-up items that aren\\u2019t selling.'},\n      {id:'adjust', text:'Lower prices on what\\u2019s not moving; nudge up what flies off the rack.'},\n      {id:'recheck', text:'Re-check next week — watch sell-thru and % of goal climb.'},\n    ];\n    const checks = this.state.checks;\n    const checklist = checkDefs.map(c=>{\n      const on = !!checks[c.id];\n      return { ...c,\n        onClick: ()=> this.setState({ checks: {...this.state.checks, [c.id]: !on} }),\n        check: on ? '\\u2713' : '',\n        style: `appearance:none;display:flex;align-items:center;gap:14px;text-align:left;cursor:pointer;width:100%;padding:15px 18px;border-radius:12px;transition:all .18s;background:${on?'#E5F4D8':'#fff'};border:2px solid ${on?'#82C341':'#CCE8F5'};`,\n        boxStyle: `flex:none;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:Archivo,sans-serif;font-weight:900;font-size:16px;background:${on?'#82C341':'#fff'};color:#fff;border:2px solid ${on?'#82C341':'#B9C7D2'};`,\n        textStyle: `font-size:16px;line-height:1.4;color:${on?'#2c4a14':'#2a3940'};font-weight:${on?600:500};${on?'':''}` };\n    });\n    const allChecked = checkDefs.every(c=>checks[c.id]);\n\n    // ---- nav ----\n    const navPrimary = 'appearance:none;border:none;cursor:pointer;font-family:Archivo,sans-serif;font-weight:700;font-size:16px;padding:13px 30px;border-radius:11px;background:#0065A4;color:#fff;box-shadow:0 4px 14px -3px rgba(0,101,164,.55);';\n    const backStyle = step===0\n      ? 'visibility:hidden;appearance:none;border:none;font-family:Archivo,sans-serif;font-weight:700;font-size:16px;padding:13px 24px;'\n      : 'appearance:none;border:2px solid #B9C7D2;cursor:pointer;font-family:Archivo,sans-serif;font-weight:700;font-size:16px;padding:11px 24px;border-radius:11px;background:#fff;color:#3A4A52;';\n    const nextLabel = step===0 ? 'Start the tour \\u2192' : step===last ? 'Finish' : 'Next \\u2192';\n    const nextStyle = step===last\n      ? navPrimary.replace('#0065A4','#82C341').replace('rgba(0,101,164,.55)','rgba(130,195,65,.55)')\n      : navPrimary;\n\n    return {\n      ...sFlags, dots, total, stepHuman: step+1,\n      stepLabel: this.labels[step],\n      next: ()=> step===last ? this.go(0) : this.go(step+1),\n      back: ()=> this.go(step-1),\n      restart: ()=> this.setState({ step:0, markup:12, found:{}, mapNote:null, scenario:null, q1:null, q2:null, checks:{} }),\n      nextLabel, nextStyle, backStyle,\n      // simulator\n      markup: m,\n      onMarkup: (e)=> this.setState({ markup: +e.target.value }),\n      sellThruTxt: Math.round(sellThru),\n      sellThruW: Math.round(sellThru),\n      salesTxt: '$' + Math.round(idx/100*1.05*10)/10 + 'k',\n      salesW: Math.min(100, Math.round(idx/salesIdxMax*100)),\n      pct, goalW: Math.min(100, Math.max(2, Math.round(pct/120*100))),\n      statusColor, statusMsg, bonusBg,\n      bonusTxt: '$' + bonus.toLocaleString(),\n      // rack\n      rack,\n      // map\n      stores, mapNote, mapNoteBg, mapNoteBorder,\n      // scenario\n      scenarioOpts, scenarioAnswered, scenarioFb, scenarioFbBg, scenarioFbBorder,\n      // quiz\n      q1Opts, q2Opts, quizDone,\n      // checklist\n      checklist, allChecked,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Mark Up Guide standalone.dc"}
